<!DOCTYPE html>
<html>
<head>
  <title>Personality Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; max-width: 600px; margin: 40px auto; }
    button { display: block; margin: 10px 0; padding: 10px; width: 100%; }
    #result { margin-top: 30px; font-size: 20px; font-weight: bold; }
  </style>
</head>
<body>

<h1>Personality Quiz</h1>
<div id="quiz"></div>
<div id="result"></div>

<script>
// ==========================
// 1️⃣ DEFINE PERSONALITY TYPES
// ==========================
const types = {
  A: { name: "Owl 🦉", image: "images/owl.jpg" },
  B: { name: "Dolphin 🐬", image: "images/dolphin.jpg" },
  C: { name: "Zebra 🦓", image: "images/zebra.jpg" },
  D: { name: "Camel 🐪", image: "images/camel.jpg" },
  E: { name: "Penguin 🐧", image: "images/penguin.jpg" },
  F: { name: "Hedgehog 🦔", image: "images/hedgehog.jpg" },
  G: { name: "Fox 🦊", image: "images/fox.jpg" },
  H: { name: "Alligator 🐊", image: "images/alligator.jpg" }
};

// ==========================
// 2️⃣ DEFINE QUESTIONS
// Each answer gives points to a type
// ==========================
const questions = [
  {
    question: "On the weekend I want to go to...",
    answers: [
      { text: "Stadium City", type: "H" },     // Competitive → Alligator
      { text: "Cocowalk", type: "B" },         // Social → Dolphin
      { text: "Stay at home", type: "F" },     // Introvert → Hedgehog
      { text: "a Cafe", type: "A" },           // Thoughtful → Owl
      { text: "Club activities", type: "E" },  // Team-based → Penguin
      { text: "Nakaojo Park", type: "C" }      // Free/expressive → Zebra
    ]
  },
  {
    question: "I would like to live in...:",
    answers: [
      { text: "The Mountains", type: "A" },      // Wise owl vibes
      { text: "Near the Sea", type: "B" },       // Dolphin
      { text: "In the City", type: "G" },        // Clever/strategic → Fox
      { text: "In the Countryside", type: "D" }, // Calm → Camel
      { text: "On the moon", type: "C" },        // Unique → Zebra
      { text: "In a forest", type: "F" }         // Quiet → Hedgehog
    ]
  },
  {
    question: "I most enjoy playing...:",
    answers: [
      { text: "Basketball", type: "H" },   // Competitive → Alligator
      { text: "Baseball", type: "E" },     // Team loyalty → Penguin
      { text: "Soccer", type: "B" },       // Energetic → Dolphin
      { text: "Volleyball", type: "C" },   // Expressive/team mix → Zebra
      { text: "Tennis", type: "G" },       // Strategic → Fox
      { text: "Rugby", type: "H" }         // Physical strength → Alligator
    ]
  },
  {
    question: "In the future, I would like to be a..:",
    answers: [
      { text: "Doctor", type: "E" },       // Caring → Penguin
      { text: "Lawyer", type: "G" },       // Strategic → Fox
      { text: "Scientist", type: "A" },    // Intelligent → Owl
      { text: "Nurse", type: "E" },        // Caring → Penguin
      { text: "Teacher", type: "A" },      // Knowledge → Owl
      { text: "Pharmacist", type: "D" }    // Calm/steady → Camel
    ]
  },
  {
    question: "My favorite kind of movie is...:",
    answers: [
      { text: "Action", type: "H" },   // Bold → Alligator
      { text: "Sci-fi", type: "A" },   // Intellectual → Owl
      { text: "Romance", type: "B" },  // Social/emotional → Dolphin
      { text: "Comedy", type: "C" },   // Expressive → Zebra
      { text: "Drama", type: "E" },    // Emotional loyalty → Penguin
      { text: "Music", type: "C" }     // Creative → Zebra
    ]
  }
];

// ==========================
// QUIZ LOGIC
// ==========================

let currentQuestion = 0;
const scores = {};

Object.keys(types).forEach(t => scores[t] = 0);

function loadQuestion() {
  const quizDiv = document.getElementById("quiz");
  quizDiv.innerHTML = "";

  if (currentQuestion >= questions.length) {
    showResult();
    return;
  }

  const q = questions[currentQuestion];

  const questionEl = document.createElement("h3");
  questionEl.innerText = q.question;
  quizDiv.appendChild(questionEl);

  q.answers.forEach(answer => {
    const button = document.createElement("button");
    button.innerText = answer.text;
    button.onclick = () => selectAnswer(answer.type);
    quizDiv.appendChild(button);
  });
}

function selectAnswer(type) {
  scores[type]++;
  currentQuestion++;
  loadQuestion();
}

function showResult() {
  const resultDiv = document.getElementById("result");

  let topType = null;
  let highestScore = -1;

  for (let type in scores) {
    if (scores[type] > highestScore) {
      highestScore = scores[type];
      topType = type;
    }
  }

  resultDiv.innerText = "Your result: " + types[topType];
  document.getElementById("quiz").innerHTML = "";
}

loadQuestion();
</script>

</body>
</html>
