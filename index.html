<!DOCTYPE html>
<html>
<head>
  <title>Personality Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; max-width: 600px; margin: 40px auto; }
    button { display: block; margin: 10px 0; padding: 10px; width: 100%; }
    #result { margin-top: 30px; font-size: 20px; font-weight: bold; }
  </style>
</head>
<body>

<h1>Personality Quiz</h1>
<div id="quiz"></div>
<div id="result"></div>

<script>
// ==========================
// 1️⃣ DEFINE PERSONALITY TYPES
// ==========================
const types = {
  A: "Owl 🦉",
  B: "Dolphin 🐬",
  C: "Zebra 🦓",
  D: "Camel 🐪",
  E: "Penguin 🐧",
  F: "Hedgehog 🦔"
};

// ==========================
// 2️⃣ DEFINE QUESTIONS
// Each answer gives points to a type
// ==========================
const questions = [
  {
    question: "On the weekend I want to go to...",
    answers: [
      { text: "Stadium City", type: "A" },
      { text: "Cocowalk", type: "B" },
      { text: "Stay at home", type: "C" },
      { text: "a Cafe", type: "D" },
      { text: "Club activities", type: "E" },
      { text: "Nakaojo Park", type: "F" }
    ]
  },
  {
    question: "I would like to live in...:",
    answers: [
      { text: "The Mountains", type: "A" },
      { text: "Near the Sea", type: "B" },
      { text: "In the City", type: "C" },
      { text: "In the Countryside", type: "D" },
      { text: "Club activities", type: "E" },
      { text: "Nakaojo Park", type: "F" }
    ]
  },
  {
    question: "The best sport is...:",
    answers: [
      { text: "Basketball", type: "A" },
      { text: "Baseball", type: "B" },
      { text: "Soccer", type: "C" },
      { text: "Volleyball", type: "D" },
      { text: "Club activities", type: "E" },
      { text: "Nakaojo Park", type: "F" }
    ]
  }
];

// ==========================
// QUIZ LOGIC
// ==========================

let currentQuestion = 0;
const scores = {};

Object.keys(types).forEach(t => scores[t] = 0);

function loadQuestion() {
  const quizDiv = document.getElementById("quiz");
  quizDiv.innerHTML = "";

  if (currentQuestion >= questions.length) {
    showResult();
    return;
  }

  const q = questions[currentQuestion];

  const questionEl = document.createElement("h3");
  questionEl.innerText = q.question;
  quizDiv.appendChild(questionEl);

  q.answers.forEach(answer => {
    const button = document.createElement("button");
    button.innerText = answer.text;
    button.onclick = () => selectAnswer(answer.type);
    quizDiv.appendChild(button);
  });
}

function selectAnswer(type) {
  scores[type]++;
  currentQuestion++;
  loadQuestion();
}

function showResult() {
  const resultDiv = document.getElementById("result");

  let topType = null;
  let highestScore = -1;

  for (let type in scores) {
    if (scores[type] > highestScore) {
      highestScore = scores[type];
      topType = type;
    }
  }

  resultDiv.innerText = "Your result: " + types[topType];
  document.getElementById("quiz").innerHTML = "";
}

loadQuestion();
</script>

</body>
</html>
